
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/main.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
  tempo:
    image: grafana/tempo:1.5.0
    container_name: tempo
    ports:
      - 3200:3200  # Tempo query port
      - 9095:9095  # gRPC
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo/traces
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - 3100:3100
    command: ["-config.file=/etc/loki.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki.yaml:ro
      - loki_data:/loki
    depends_on:
      - otel-collector
  free23ai:
    image: gvenzl/oracle-free:23.26.1-slim-faststart
    container_name: free23ai
    ports:
      - 1521:1521
    environment:
      - ORACLE_PASSWORD=Welcome12345
    volumes:
      - ./oracle:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "lsnrctl status | grep READY"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  second23ai:
    image: gvenzl/oracle-free:23.26.1-slim-faststart
    container_name: second23ai
    ports:
      - 1522:1521
    environment:
      - ORACLE_PASSWORD=Welcome12345
    volumes:
      - ./oracle:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "lsnrctl status | grep READY"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  exporter:
    image: container-registry.oracle.com/database/observability-exporter:2.3.0
    container_name: exporter
    command:
      - --config.file=/exporter/${COMPOSE_CONFIG_FILE}
      # - '--log.level=debug'
      # - '--database.maxIdleConns=10'
      # - '--database.maxOpenConns=10'
    ports:
      - 9161:9161
    environment:
    # If using wallet, these can bet set. Otherwise, not necessary to supply.
    - TNS_ADMIN=${TNS_ADMIN}
    - ADB_USERNAME=${ADB_USERNAME}
    - ADB_PASSWORD=${ADB_PASSWORD}
    - ADB_TNS_ALIAS=${ADB_TNS_ALIAS}
    #   - DB_USERNAME=pdbadmin
    #   - DB_PASSWORD=Welcome12345
    #   - DB_CONNECT_STRING=free23ai:1521/freepdb1
    #   - CUSTOM_METRICS=/exporter/txeventq-metrics.toml,/exporter/more-txeventq-metrics.toml
    volumes:
      - ./exporter:/exporter
      - ./wallet:/exporter/wallet

    depends_on: 
      free23ai:
        condition: service_healthy
      second23ai:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - 4317:4317    # OTLP gRPC
      - 4318:4318    # OTLP HTTP
      - 8889:8889    # Prometheus exporter from collector (host port changed to avoid conflict)
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command:
      - "--config=/etc/otel-collector-config.yaml"
    depends_on:
      free23ai:
        condition: service_healthy
      second23ai:
        condition: service_healthy
      exporter:
        condition: service_started

volumes:
  prom_data:
  loki_data:
  tempo_data:
