groups:
  - name: oracle-db-alerts
    rules:
      - alert: OracleDBHighActiveSessions
        expr: oracle_sql_oracle_sessions > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High Oracle active sessions on {{ $labels.db_name }}"
          description: "Database {{ $labels.db_name }} has {{ $value }} active sessions for more than 5 minutes."
      - alert: OracleDBLowActiveSessions
        expr: oracle_sql_oracle_sessions < 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low Oracle active sessions on {{ $labels.db_name }}"
          description: "Database {{ $labels.db_name }} has {{ $value }} active sessions for more than 5 minutes."